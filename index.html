<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Toroide en Realidad Aumentada</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- ARJS -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

#panel{

    position:absolute;

    top:10px;

    left:10px;

    background:white;

    padding:12px;

    border-radius:12px;

    z-index:999;

    width:300px;

    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div id="panel">

<h2>Superficie de Nivel</h2>

<p>

Toroide en Realidad Aumentada

</p>

<p>

Ecuación implícita:

</p>

<p>

(x² + y² + z² + R² − r²)² = 4R²(x² + y²)

</p>

<p>

R = 1

<br>

r = 1.5

</p>

</div>

<a-scene

embedded

vr-mode-ui="enabled:false"

renderer="logarithmicDepthBuffer:true;"

arjs="sourceType:webcam;
      debugUIEnabled:false;">

<!-- MARCADOR -->

<a-marker preset="hiro">

<!-- ============================ -->
<!-- EJES -->
<!-- ============================ -->

<!-- X -->
<a-cylinder

position="3 0 0"

rotation="0 0 90"

radius="0.02"

height="8"

color="red">

</a-cylinder>

<!-- Y -->
<a-cylinder

position="0 3 0"

radius="0.02"

height="8"

color="green">

</a-cylinder>

<!-- Z -->
<a-cylinder

position="0 0 3"

rotation="90 0 0"

radius="0.02"

height="8"

color="blue">

</a-cylinder>

<!-- ============================ -->
<!-- ESCALAS -->
<!-- ============================ -->

<a-text value="X"

position="4.5 0 0"

color="red"

scale="2 2 2">

</a-text>

<a-text value="Y"

position="0 4.5 0"

color="green"

scale="2 2 2">

</a-text>

<a-text value="Z"

position="0 0 4.5"

color="blue"

scale="2 2 2">

</a-text>

<!-- ============================ -->
<!-- TOROIDE -->
<!-- ============================ -->

<a-torus

id="toroide"

position="0 1 0"

radius="2"

radius-tubular="0.7"

rotation="90 0 0"

color="#ff6600"

metalness="0.2"

roughness="0.4"

opacity="0.85">

</a-torus>

<!-- ============================ -->
<!-- ILUMINACION -->
<!-- ============================ -->

<a-light

type="ambient"

color="#ffffff"

intensity="0.7">

</a-light>

<a-light

type="directional"

position="2 4 2"

intensity="1">

</a-light>

<!-- ============================ -->
<!-- TEXTO -->
<!-- ============================ -->

<a-text

value="Toroide"

position="-1 3 0"

color="black"

scale="2 2 2">

</a-text>

</a-marker>

<!-- CAMARA -->

<a-entity camera></a-entity>

</a-scene>

<script>

// ======================================
// ROTACION AUTOMATICA
// ======================================

const toroide = document.querySelector("#toroide");

let angulo = 0;

function animar(){

    angulo += 0.5;

    toroide.setAttribute(

        "rotation",

        `90 ${angulo} 0`

    );

    requestAnimationFrame(animar);
}

animar();

</script>

</body>

</html>
